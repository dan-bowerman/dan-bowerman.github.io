    <style>
        /* Base terminal styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #00ffff; /* Changed to Cyan */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* CRT Screen Effects */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(0, 255, 255, 0.04), rgba(0, 200, 255, 0.01), rgba(0, 255, 255, 0.04));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* Container for content */
        .terminal-container {
            width: 85%;
            max-width: 1000px;
            z-index: 1;
            text-shadow: 0 0 8px #00ffff;
        }

        /* Text area */
        #output {
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.6;
            min-height: 120px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.2rem;
            background-color: #00ffff;
            vertical-align: baseline;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 8px #00ffff;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Vector Map Styling */
        #map-container {
            width: 100%;
            opacity: 0; /* Hidden initially */
            transition: opacity 1s ease-in;
        }

        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 4px #00ffff);
        }

        .map-line {
            fill: none;
            stroke: #00ffff;
            stroke-width: 1.2;
            stroke-linejoin: round;
            stroke-linecap: round;
            transition: stroke-dashoffset 2.8s ease-out;
        }

        .grid-line {
            stroke: #008080; /* Darker cyan/teal for the grid */
            stroke-width: 1;
            stroke-dasharray: 4, 4;
            opacity: 0.5;
        }

        .target-dot {
            fill: #00ffff;
        }

        .target-pulse {
            fill: none;
            stroke: #00ffff;
            stroke-width: 1.5;
            transform-box: fill-box;
            transform-origin: center;
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(7.5); opacity: 0; }
        }

    </style>
</head>

                        <circle cx="451.5" cy="209.1" r="2" class="target-dot" />
                        <circle cx="451.5" cy="209.1" r="2" class="target-pulse" />

    <script>
        const textSequence = [
            "LOGON: *********",
            "VERIFYING PASSWORD...",
            "ACCESS GRANTED.",
            "",
            "GREETINGS PROFESSOR FALKEN.",
            "",
            "SHALL WE PLAY A GAME?"
        ];

        const outputDiv = document.getElementById("output");
        const mapContainer = document.getElementById("map-container");
        let lineIndex = 0;
        let charIndex = 0;
        const typingSpeed = 45; // ms per character
        const lineDelay = 700;  // ms between lines

        function typeWriter() {
            if (lineIndex < textSequence.length) {
                const currentLine = textSequence[lineIndex];
                
                if (charIndex < currentLine.length) {
                    // Type next character
                    let currentText = outputDiv.innerHTML.replace('<span class="cursor"></span>', '');
                    currentText += currentLine.charAt(charIndex);
                    outputDiv.innerHTML = currentText + '<span class="cursor"></span>';
                    charIndex++;
                    
                    // Randomize typing speed slightly for realism
                    let speedVariance = typingSpeed + (Math.random() * 30 - 15);
                    setTimeout(typeWriter, speedVariance);
                } else {
                    // Line finished, move to next line
                    let currentText = outputDiv.innerHTML.replace('<span class="cursor"></span>', '');
                    outputDiv.innerHTML = currentText + '<br><span class="cursor"></span>';
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, lineDelay);
                }
            } else {
                // Typing finished. Turn the idle cursor into a waiting input prompt.
                let currentText = outputDiv.innerHTML.replace('<span class="cursor"></span>', '&gt; <span class="cursor"></span>');
                outputDiv.innerHTML = currentText;
                setTimeout(revealMap, 600);
            }
        }

        // Prime each coastline path with its own real length so the "draw-on"
        // effect is accurate regardless of whether it's a continent or a small island.
        function primeMapPaths() {
            const paths = document.querySelectorAll('.map-line');
            paths.forEach(path => {
                const length = path.getTotalLength();
                path.style.transition = 'none';
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
            });
        }

        function revealMap() {
            mapContainer.style.opacity = "1";

            const paths = document.querySelectorAll('.map-line');
            paths.forEach(path => {
                // Force reflow so the transition re-enables before we animate to 0
                path.getBoundingClientRect();
                path.style.transition = 'stroke-dashoffset 2.8s ease-out';
                path.style.strokeDashoffset = '0';
            });
        }

        // Start sequence on load
        window.onload = () => {
            outputDiv.innerHTML = '<span class="cursor"></span>';
            primeMapPaths();
            setTimeout(typeWriter, 1200);
        };
    </script>
</body>
