<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="6 feet of bubble gum, for you, not them.">
  <title>Start</title>
  <style>
    :root {
      --bg: #1d1d1d;
      --surface: #151515;
      --border: #272727;
      --text: #d8d8d8;
      --text-dim: #9CDCFE;
      --accent: #f984b9;
      --accent-glow: rgba(249, 132, 185, 0.12);
      --font: "Courier New", Courier, monospace;
      --radius: 5px;
      --gap: 0.45rem;
      --col-gap: 3.5vw;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: clamp(16px, 1.2vw, 20px);
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: clamp(1.2rem, 2.5vw, 3rem) clamp(1rem, 3vw, 3.5rem) 3rem;
    }

    #root {
      max-width: 100%;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      margin-bottom: clamp(1.4rem, 2.5vw, 2.8rem);
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    #clock {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: bold;
      letter-spacing: -0.02em;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #date {
      font-size: clamp(0.68rem, 0.75vw, 0.82rem);
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #categories {
      display: flex;
      gap: var(--col-gap);
      align-items: flex-start;
    }

    .col {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.55rem;
    }

    .cat-label {
      font-size: clamp(0.70rem, 1.65vw, 0.70rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      user-select: none;
    }

    .cat-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap);
      list-style: none;
    }

    a.chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.28rem 0.62rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-family: var(--font);
      font-size: clamp(0.8rem, 0.85vw, 0.92rem);
      line-height: 1;
      transition: color 100ms, border-color 100ms, background 100ms;
      white-space: nowrap;
    }

    a.chip:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    a.chip:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    a.chip img {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: block;
    }

    .multi-chip {
      display: inline-flex;
      align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .multi-chip__icon {
      display: flex;
      align-items: center;
      padding: 0.28rem 0.48rem;
      border-right: 1px solid var(--border);
      pointer-events: none;
    }

    .multi-chip__icon img {
      width: 16px;
      height: 16px;
      display: block;
    }

    .multi-chip a {
      display: inline-flex;
      align-items: center;
      padding: 0.28rem 0.52rem;
      color: var(--text);
      text-decoration: none;
      font-family: var(--font);
      font-size: clamp(0.8rem, 0.85vw, 0.92rem);
      line-height: 1;
      transition: color 100ms, background 100ms;
      white-space: nowrap;
    }

    .multi-chip a+a {
      border-left: 1px solid var(--border);
    }

    .multi-chip a:hover {
      color: var(--accent);
      background: var(--accent-glow);
    }

    .multi-chip a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    @media (max-width: 680px) {
      body {
        padding: 1.2rem 0.9rem 2rem;
      }

      #clock {
        font-size: 1.9rem;
      }

      #date {
        font-size: 0.72rem;
      }

      header {
        margin-bottom: 1.6rem;
      }

      #categories {
        flex-direction: column;
        gap: 1.4rem;
      }

      .col {
        gap: 1.4rem;
      }

      a.chip {
        font-size: 1rem;
        padding: 0.42rem 0.75rem;
      }

      a.chip img {
        width: 15px;
        height: 15px;
      }

      .multi-chip a {
        font-size: 1rem;
        padding: 0.42rem 0.65rem;
      }

      .multi-chip__icon img {
        width: 15px;
        height: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      a.chip,
      .multi-chip a {
        transition: none;
      }
    }
  </style>
</head>

<body>

    /* ---------------------------------------------------------------
       ICON RESOLUTION
       No more self-hosted favicons. Each icon is resolved live from the
       link's own domain, with a generated letter-tile as a guaranteed
       fallback. The `icon:` field below is now an OPTIONAL override:
       any old dsfargeg.com path is ignored and derived automatically.
    ----------------------------------------------------------------*/

    // Where public favicons come from. Flip this to taste:
    //   "google"     – most reliable, real logos (pings google.com)
    //   "duckduckgo" – privacy-friendlier, slightly spottier
    //   "direct"     – hotlink the site's own /favicon.ico, no third party
    const PROVIDER = "google";

    // Domains a third-party favicon service can't reach (your intranet /
    // non-prod govt hosts). These skip the service and try the site
    // directly — which works from your browser since you're on the network.
    const INTERNAL = [/\.int\.ec\.gc\.ca$/i, /^intranet\./i, /\.cloud-nuage\.gc\.ca$/i];

    function providerUrl(host) {
      if (PROVIDER === "duckduckgo") return `https://icons.duckduckgo.com/ip3/${host}.ico`;
      if (PROVIDER === "direct")     return `https://${host}/favicon.ico`;
      return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
    }

    // Deterministic letter-tile (data URI SVG) — distinct colour per label,
    // tuned to the page's dark palette. Never errors, works offline & for
    // anything the favicon services can't see.
    function monogram(label) {
      const ch = (String(label).match(/[A-Za-z0-9]/) || ["#"])[0].toUpperCase();
      let h = 0;
      for (const c of String(label)) h = (h * 31 + c.charCodeAt(0)) % 360;
      const bg = `hsl(${h},42%,21%)`;
      const fg = `hsl(${h},72%,77%)`;
      const svg =
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">` +
        `<rect width="16" height="16" rx="3" fill="${bg}"/>` +
        `<text x="8" y="8.5" font-family="Courier New,monospace" font-size="11" ` +
        `font-weight="700" fill="${fg}" text-anchor="middle" ` +
        `dominant-baseline="central">${ch}</text></svg>`;
      return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
    }

    function iconChain(url, label, override) {
      let host = "";
      try { host = new URL(url).hostname; } catch (e) { /* keep empty */ }
      const chain = [];
      if (override && !/dsfargeg\.com/i.test(override)) chain.push(override);
      if (host) {
        const internal = INTERNAL.some(re => re.test(host));
        chain.push(internal ? `https://${host}/favicon.ico` : providerUrl(host));
      }
      chain.push(monogram(label));          // always the last resort
      return chain;
    }

    // Wire an <img> to walk its source chain, advancing on each load error.
    function attachIcon(img, chain) {
      let i = 0;
      img.src = chain[0];
      img.onerror = () => {
        i += 1;
        if (i < chain.length) img.src = chain[i];
        else img.onerror = null;
      };
    }

    const DAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const MONTHS = ["January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"];
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${h}:${m}:${s}`;
      document.getElementById("date").textContent =
        `${DAYS[now.getDay()]}  ${MONTHS[now.getMonth()]} ${now.getDate()},  ${now.getFullYear()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
    const col1 = document.getElementById("col-1");
    const col2 = document.getElementById("col-2");
    let autoCol = 1;

    GROUPS.forEach(group => {
      const target = group.col === 1 ? col1
        : group.col === 2 ? col2
          : (autoCol === 1 ? col1 : col2);

      if (!group.col) autoCol = autoCol === 1 ? 2 : 1;

      const labelId = `cat-${group.label.replace(/\s+/g, "-").toLowerCase()}`;

      const section = document.createElement("section");
      section.className = "category";
      section.setAttribute("aria-labelledby", labelId);
      const hdr = document.createElement("div");
      hdr.className = "cat-header";
      hdr.setAttribute("aria-hidden", "true");
      const lbl = document.createElement("span");
      lbl.className = "cat-label";
      lbl.id = labelId;
      lbl.textContent = group.label;
      const rule = document.createElement("div");
      rule.className = "cat-rule";
      rule.setAttribute("role", "presentation");
      hdr.appendChild(lbl);
      hdr.appendChild(rule);
      section.appendChild(hdr);
      const ul = document.createElement("ul");
      ul.className = "links";
      ul.setAttribute("role", "list");
      group.links.forEach(item => {
        const li = document.createElement("li");
        if (item.links) {
          const wrap = document.createElement("div");
          wrap.className = "multi-chip";
          wrap.setAttribute("role", "group");
          wrap.setAttribute("aria-label", item.label);
          const iconSpan = document.createElement("span");
          iconSpan.className = "multi-chip__icon";
          iconSpan.setAttribute("aria-hidden", "true");
          const iconImg = document.createElement("img");
          iconImg.alt = "";
          attachIcon(iconImg, iconChain(item.links[0] && item.links[0].url, item.label, item.icon));
          iconImg.width = 13; iconImg.height = 13;
          iconSpan.appendChild(iconImg);
          wrap.appendChild(iconSpan);
          item.links.forEach(sub => {
            const a = document.createElement("a");
            a.href = sub.url;
            a.textContent = sub.label;
            a.setAttribute("aria-label", `${item.label} — ${sub.label}`);
            wrap.appendChild(a);
          });
          li.appendChild(wrap);
        } else {
          const a = document.createElement("a");
          a.href = item.url;
          a.className = "chip";
          const img = document.createElement("img");
          img.alt = "";
          attachIcon(img, iconChain(item.url, item.label, item.icon));
          img.width = 13; img.height = 13;
          img.setAttribute("aria-hidden", "true");
          const span = document.createElement("span");
          span.textContent = item.label;
          a.appendChild(img);
          a.appendChild(span);
          li.appendChild(a);
        }
        ul.appendChild(li);
      });
      section.appendChild(ul);
      target.appendChild(section);
    });
  </script>
</body>
