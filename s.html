<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="It's 6 feet of bubble gum, for you, not them.">
  <title>Start</title>
  <style>
    :root {
      --bg: #1d1d1d;
      --surface: #151515;
      --border: #272727;
      --text: #d8d8d8;
      --text-dim: #9cdcfe;
      --accent: #f984b9;
      --accent-glow: rgba(249, 132, 185, 0.12);
      --font: "Courier New", Courier, monospace;
      --radius: 5px;
      --gap: 0.45rem;
      --col-gap: 3.5vw;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: clamp(16px, 1.2vw, 20px);
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      padding: clamp(1.2rem, 2.5vw, 3rem) clamp(1rem, 3vw, 3.5rem) 3rem;
      background: var(--bg);
      color: var(--text);
      font: 1rem/1.4 var(--font);
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      margin-bottom: clamp(1.4rem, 2.5vw, 2.8rem);
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    #clock {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #date {
      font-size: clamp(0.68rem, 0.75vw, 0.82rem);
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #categories {
      display: flex;
      gap: var(--col-gap);
      align-items: flex-start;
    }

    .col {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.55rem;
    }

    .cat-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      user-select: none;
    }

    .cat-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap);
      list-style: none;
    }

    .chip,
    .multi-chip>a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.28rem 0.62rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-family: var(--font);
      font-size: clamp(0.8rem, 0.85vw, 0.92rem);
      line-height: 1;
      transition: color 100ms, border-color 100ms, background 100ms;
      white-space: nowrap;
    }

    .chip:hover,
    .multi-chip>a:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .chip:focus-visible,
    .multi-chip>a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .chip img,
    .multi-chip__icon img {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: block;
    }

    .multi-chip {
      display: inline-flex;
      align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .multi-chip__icon {
      display: flex;
      align-items: center;
      padding: 0.28rem 0.48rem;
      border-right: 1px solid var(--border);
      pointer-events: none;
    }

    .multi-chip>a {
      padding: 0.28rem 0.52rem;
    }

    .multi-chip>a+a {
      border-left: 1px solid var(--border);
    }

    @media (max-width: 680px) {
      body {
        padding: 1.2rem 0.9rem 2rem;
      }

      #clock {
        font-size: 1.9rem;
      }

      #date {
        font-size: 0.72rem;
      }

      header {
        margin-bottom: 1.6rem;
      }

      #categories {
        flex-direction: column;
        gap: 1.4rem;
      }

      .col {
        gap: 1.4rem;
      }

      .chip,
      .multi-chip>a {
        font-size: 1rem;
        padding: 0.42rem 0.75rem;
      }

      .chip img,
      .multi-chip__icon img {
        width: 15px;
        height: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .chip,
      .multi-chip>a {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <header>
      <div id="clock" aria-live="polite" aria-atomic="true" aria-label="Current time"></div>
      <div id="date" aria-live="off"></div>
    </header>
    <main id="categories" aria-label="Bookmarks">
      <div class="col" id="col-1"></div>
      <div class="col" id="col-2"></div>
    </main>
  </div>
  <script>
    function providerUrl(host) {
      if (PROVIDER === "duckduckgo") return `https://icons.duckduckgo.com/ip3/${host}.ico`;
      if (PROVIDER === "direct") return `https://${host}/favicon.ico`;
      return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
    }

    function monogram(label) {
      const ch = (String(label).match(/[A-Za-z0-9]/) || ["#"])[0].toUpperCase();
      let h = 0;
      for (const c of String(label)) h = (h * 31 + c.charCodeAt(0)) % 360;
      const svg =
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">` +
        `<rect width="16" height="16" rx="3" fill="hsl(${h},42%,21%)"/>` +
        `<text x="8" y="8.5" font-family="Courier New,monospace" font-size="11" ` +
        `font-weight="700" fill="hsl(${h},72%,77%)" text-anchor="middle" ` +
        `dominant-baseline="central">${ch}</text></svg>`;
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    function iconChain(url, label) {
      let host = "";
      try { host = new URL(url).hostname; } catch { }
      const chain = [];
      if (host) chain.push(INTERNAL.some(re => re.test(host)) ? `https://${host}/favicon.ico` : providerUrl(host));
      chain.push(monogram(label));
      return chain;
    }

    function attachIcon(img, chain) {
      img.src = chain[chain.length - 1];
      if (chain.length > 1) ICON_QUEUE.push({ img, chain: chain.slice(0, -1) });
    }

    function create(tag, props = {}, parent) {
      const el = document.createElement(tag);
      Object.entries(props).forEach(([key, value]) => {
        if (value == null) return;
        if (key === "className") el.className = value;
        else if (key === "textContent") el.textContent = value;
        else el.setAttribute(key, value);
      });
      if (parent) parent.appendChild(el);
      return el;
    }

    function renderGroup(group, target, autoCol) {
      const labelId = `cat-${group.label.replace(/\s+/g, "-").toLowerCase()}`;
      const section = create("section", { className: "category", "aria-labelledby": labelId }, target);
      const header = create("div", { className: "cat-header", "aria-hidden": "true" }, section);
      create("span", { className: "cat-label", id: labelId, textContent: group.label }, header);
      create("div", { className: "cat-rule", role: "presentation" }, header);

      const list = create("ul", { className: "links", role: "list" }, section);
      group.links.forEach(item => {
        const li = create("li", {}, list);
        if (item.links) {
          const wrap = create("div", { className: "multi-chip", role: "group", "aria-label": item.label }, li);
          const icon = create("span", { className: "multi-chip__icon", "aria-hidden": "true" }, wrap);
          const img = create("img", { alt: "" }, icon);
          const firstUrl = item.links[0] ? item.links[0].url : "";
          attachIcon(img, iconChain(firstUrl, item.label));
          item.links.forEach(sub => create("a", { href: sub.url, textContent: sub.label, "aria-label": `${item.label} — ${sub.label}` }, wrap));
        } else {
          const link = create("a", { href: item.url, className: "chip" }, li);
          const img = create("img", { alt: "", "aria-hidden": "true" }, link);
          attachIcon(img, iconChain(item.url, item.label));
          create("span", { textContent: item.label }, link);
        }
      });

      return autoCol;
    }

    window.addEventListener("load", () => {
      let i = 0;
      const next = () => {
        if (i >= ICON_QUEUE.length) return;
        const { img, chain } = ICON_QUEUE[i++];
        const fallback = img.src;
        let tries = 0;
        img.onerror = () => {
          if (++tries < chain.length) img.src = chain[tries];
          else { img.src = fallback; img.onerror = null; }
        };
        img.src = chain[0];
        setTimeout(next, 15);
      };
      next();
    });

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      const clock = document.getElementById("clock");
      const date = document.getElementById("date");
      clock.textContent = `${h}:${m}:${s}`;
      date.textContent = `${now.toLocaleDateString("en-CA", { weekday: "long" })} ${now.toLocaleDateString("en-CA", { month: "long" })} ${now.getDate()}, ${now.getFullYear()}`;
    }

    updateClock();
    setInterval(updateClock, 1000);

    const col1 = document.getElementById("col-1");
    const col2 = document.getElementById("col-2");
    const columns = [col1, col2];
    let autoCol = 0;

    GROUPS.forEach(group => {
      const target = group.col === 1 ? col1 : group.col === 2 ? col2 : columns[autoCol % 2];
      if (!group.col) autoCol += 1;
      renderGroup(group, target, autoCol);
    });
  </script>
</body>
</html>
